<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — Property Site</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

    /* ===== LOGIN ===== */
    #login-section {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: #fff; padding: 2.5rem; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1); width: 100%; max-width: 380px;
    }
    .login-box h1 { font-size: 1.4rem; margin-bottom: 1.5rem; text-align: center; color: #1a73e8; }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; font-size: .85rem; margin-bottom: .4rem; color: #555; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: .65rem .9rem; border: 1px solid #ddd;
      border-radius: 8px; font-size: .95rem; transition: border .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      outline: none; border-color: #1a73e8;
    }
    .form-group textarea { resize: vertical; min-height: 100px; }
    .btn {
      width: 100%; padding: .75rem; border: none; border-radius: 8px;
      font-size: 1rem; cursor: pointer; transition: background .2s;
    }
    .btn-primary { background: #1a73e8; color: #fff; }
    .btn-primary:hover { background: #1558b0; }
    .btn-danger { background: #e53935; color: #fff; margin-top: .5rem; }
    .btn-danger:hover { background: #b71c1c; }
    .error-msg { color: #e53935; font-size: .85rem; margin-top: .75rem; text-align: center; }

    /* ===== ADMIN PANEL ===== */
    #admin-section { display: none; }
    .admin-header {
      background: #1a73e8; color: #fff; padding: 1rem 2rem;
      display: flex; justify-content: space-between; align-items: center;
    }
    .admin-header h1 { font-size: 1.2rem; }
    .admin-header button {
      background: rgba(255,255,255,.2); color: #fff; border: none;
      padding: .5rem 1rem; border-radius: 6px; cursor: pointer; font-size: .9rem;
    }
    .admin-header button:hover { background: rgba(255,255,255,.35); }

    .admin-body { max-width: 750px; margin: 2rem auto; padding: 0 1rem; }

    .card {
      background: #fff; border-radius: 12px; padding: 2rem;
      box-shadow: 0 2px 10px rgba(0,0,0,.07); margin-bottom: 2rem;
    }
    .card h2 { font-size: 1.1rem; margin-bottom: 1.5rem; color: #333; }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media(max-width:500px) { .form-row { grid-template-columns: 1fr; } }

    .success-msg { color: #2e7d32; font-size: .9rem; margin-top: .75rem; text-align: center; }

    /* Listings table */
    .listings-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .listings-table th { background: #f5f5f5; padding: .6rem .8rem; text-align: left; }
    .listings-table td { padding: .6rem .8rem; border-bottom: 1px solid #eee; vertical-align: top; }
    .listings-table tr:hover td { background: #fafafa; }
    .btn-sm {
      padding: .3rem .7rem; border: none; border-radius: 5px;
      font-size: .8rem; cursor: pointer; margin-right: .3rem;
    }
    .btn-edit { background: #fff3e0; color: #e65100; }
    .btn-del  { background: #fce4ec; color: #c62828; }
    .tag-sale { background: #e8f5e9; color: #2e7d32; padding: .15rem .5rem; border-radius: 4px; }
    .tag-rent { background: #e3f2fd; color: #1565c0; padding: .15rem .5rem; border-radius: 4px; }
  </style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<section id="login-section">
  <div class="login-box">
    <h1>🔐 Admin Login</h1>
    <div class="form-group">
      <label>อีเมล</label>
      <input type="email" id="login-email" placeholder="admin@example.com">
    </div>
    <div class="form-group">
      <label>รหัสผ่าน</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="login-btn">เข้าสู่ระบบ</button>
    <p class="error-msg" id="login-error"></p>
  </div>
</section>

<!-- ===== ADMIN PANEL ===== -->
<section id="admin-section">
  <header class="admin-header">
    <h1>🏠 Admin Panel — Property Site</h1>
    <button id="logout-btn">ออกจากระบบ</button>
  </header>

  <div class="admin-body">

    <!-- ฟอร์มโพสต์ประกาศ -->
    <div class="card">
      <h2 id="form-title">➕ เพิ่มประกาศใหม่</h2>
      <input type="hidden" id="edit-id">

      <div class="form-row">
        <div class="form-group">
          <label>ชื่อประกาศ *</label>
          <input type="text" id="f-title" placeholder="เช่น ขายบ้าน 2 ชั้น ย่านลาดพร้าว">
        </div>
        <div class="form-group">
          <label>ประเภท *</label>
          <select id="f-type">
            <option value="sale">ขาย</option>
            <option value="rent">เช่า</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>ราคา (บาท) *</label>
          <input type="number" id="f-price" placeholder="3500000">
        </div>
        <div class="form-group">
          <label>ที่ตั้ง</label>
          <input type="text" id="f-location" placeholder="เช่น ลาดพร้าว กรุงเทพฯ">
        </div>
      </div>

      <div class="form-group">
        <label>URL รูปภาพ (ถ้ามี)</label>
        <input type="url" id="f-image" placeholder="https://...">
      </div>

      <div class="form-group">
        <label>รายละเอียด</label>
        <textarea id="f-desc" placeholder="บรรยายรายละเอียดอสังหาริมทรัพย์..."></textarea>
      </div>

      <button class="btn btn-primary" id="submit-btn">บันทึกประกาศ</button>
      <button class="btn btn-danger" id="cancel-edit-btn" style="display:none">ยกเลิกการแก้ไข</button>
      <p id="form-msg" style="margin-top:.75rem; text-align:center; font-size:.9rem;"></p>
    </div>

    <!-- รายการประกาศทั้งหมด -->
    <div class="card">
      <h2>📋 ประกาศทั้งหมด</h2>
      <div id="listings-container">
        <p style="color:#999">กำลังโหลด...</p>
      </div>
    </div>

  </div>
</section>

<script type="module">
  import { login, logout, watchAuthState } from "./js/auth.js";
  import { addListing, updateListing, deleteListing } from "./js/admin.js";
  import { getAllListings } from "./js/listings.js";

  // ===== Auth state =====
  watchAuthState(user => {
    if (user) {
      document.getElementById("login-section").style.display = "none";
      document.getElementById("admin-section").style.display = "block";
      loadListings();
    } else {
      document.getElementById("login-section").style.display = "flex";
      document.getElementById("admin-section").style.display = "none";
    }
  });

  // ===== Login =====
  document.getElementById("login-btn").addEventListener("click", async () => {
    const email    = document.getElementById("login-email").value.trim();
    const password = document.getElementById("login-password").value;
    const errorEl  = document.getElementById("login-error");

    if (!email || !password) { errorEl.textContent = "กรุณากรอกอีเมลและรหัสผ่าน"; return; }

    const result = await login(email, password);
    if (!result.success) errorEl.textContent = result.message;
  });

  // ===== Logout =====
  document.getElementById("logout-btn").addEventListener("click", () => logout());

  // ===== Submit ประกาศ =====
  document.getElementById("submit-btn").addEventListener("click", async () => {
    const id    = document.getElementById("edit-id").value;
    const title = document.getElementById("f-title").value.trim();
    const type  = document.getElementById("f-type").value;
    const price = document.getElementById("f-price").value;
    const msgEl = document.getElementById("form-msg");

    if (!title || !price) {
      msgEl.style.color = "#e53935";
      msgEl.textContent = "กรุณากรอกชื่อประกาศและราคา";
      return;
    }

    const data = {
      title,
      type,
      price:       Number(price),
      location:    document.getElementById("f-location").value.trim(),
      description: document.getElementById("f-desc").value.trim(),
      imageUrl:    document.getElementById("f-image").value.trim(),
    };

    msgEl.style.color = "#666";
    msgEl.textContent = "กำลังบันทึก...";

    const result = id ? await updateListing(id, data) : await addListing(data);

    if (result.success) {
      msgEl.style.color = "#2e7d32";
      msgEl.textContent = id ? "✅ แก้ไขประกาศสำเร็จ" : "✅ เพิ่มประกาศสำเร็จ";
      resetForm();
      loadListings();
    } else {
      msgEl.style.color = "#e53935";
      msgEl.textContent = "❌ เกิดข้อผิดพลาด: " + result.message;
    }
  });

  // ===== Cancel edit =====
  document.getElementById("cancel-edit-btn").addEventListener("click", resetForm);

  function resetForm() {
    ["edit-id","f-title","f-price","f-location","f-image","f-desc"].forEach(id => {
      document.getElementById(id).value = "";
    });
    document.getElementById("f-type").value = "sale";
    document.getElementById("form-title").textContent = "➕ เพิ่มประกาศใหม่";
    document.getElementById("submit-btn").textContent = "บันทึกประกาศ";
    document.getElementById("cancel-edit-btn").style.display = "none";
    document.getElementById("form-msg").textContent = "";
  }

  // ===== Load listings =====
  async function loadListings() {
    const container = document.getElementById("listings-container");
    const listings  = await getAllListings();

    if (listings.length === 0) {
      container.innerHTML = `<p style="color:#999">ยังไม่มีประกาศ</p>`;
      return;
    }

    container.innerHTML = `
      <table class="listings-table">
        <thead>
          <tr>
            <th>ชื่อ</th>
            <th>ประเภท</th>
            <th>ราคา</th>
            <th>ที่ตั้ง</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody>
          ${listings.map(l => `
            <tr>
              <td>${l.title}</td>
              <td><span class="${l.type === 'sale' ? 'tag-sale' : 'tag-rent'}">${l.type === 'sale' ? 'ขาย' : 'เช่า'}</span></td>
              <td>฿${Number(l.price).toLocaleString()}</td>
              <td>${l.location || '-'}</td>
              <td>
                <button class="btn-sm btn-edit" onclick="editListing('${l.id}','${encodeURIComponent(JSON.stringify(l))}')">แก้ไข</button>
                <button class="btn-sm btn-del"  onclick="confirmDelete('${l.id}','${l.title}')">ลบ</button>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  // ===== Edit =====
  window.editListing = (id, encodedData) => {
    const l = JSON.parse(decodeURIComponent(encodedData));
    document.getElementById("edit-id").value      = id;
    document.getElementById("f-title").value      = l.title       || "";
    document.getElementById("f-type").value       = l.type        || "sale";
    document.getElementById("f-price").value      = l.price       || "";
    document.getElementById("f-location").value   = l.location    || "";
    document.getElementById("f-image").value      = l.imageUrl    || "";
    document.getElementById("f-desc").value       = l.description || "";
    document.getElementById("form-title").textContent       = "✏️ แก้ไขประกาศ";
    document.getElementById("submit-btn").textContent       = "อัปเดตประกาศ";
    document.getElementById("cancel-edit-btn").style.display = "inline-block";
    document.getElementById("form-msg").textContent = "";
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  // ===== Delete =====
  window.confirmDelete = async (id, title) => {
    if (!confirm(`ลบประกาศ "${title}" ใช่หรือไม่?`)) return;
    const result = await deleteListing(id);
    if (result.success) loadListings();
    else alert("ลบไม่สำเร็จ: " + result.message);
  };
</script>

</body>
</html>
